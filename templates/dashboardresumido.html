<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Resumido</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container mt-5">
  <h2>Verificação de Variáveis</h2>
  <!-- Adicione este bloco para verificar as variáveis -->
  <p>Percentual de Metas Atingidas: {{ percentual_metas_atingidas }}</p>
  <p>Percentual de Ações Concluídas: {{ percentual_acoes_concluidas }}</p>
</div>

<!-- O resto do conteúdo da página, como gráficos, etc -->
<div class="container mt-5">
  <div class="row text-center">
    <div class="col">
      <h2>Resumo do Planejamento Estratégico</h2>
    </div>
  </div>

  <!-- Gráfico de Metas Atingidas -->
  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Metas Atingidas</h5>
          <canvas id="metasChart"></canvas> <!-- Elemento canvas onde o gráfico será renderizado -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Script do gráfico -->
<script>
  var percentualMetas = {{ percentual_metas_atingidas | default(0) }};
  var ctxMetas = document.getElementById('metasChart').getContext('2d');
  var metasChart = new Chart(ctxMetas, {
      type: 'bar',
      data: {
          labels: ['Metas'],
          datasets: [{
              label: '% Metas Atingidas',
              data: [percentualMetas],  // Use a variável percentualMetas em vez de {{ percentual_metas_atingidas }}
              backgroundColor: '#36a2eb'
          }]
      }
  });
</script>
<script>
  var percentualAcoes = {{ percentual_acoes_concluidas | default(0) }};
  var ctxAcoes = document.getElementById('acoesChart').getContext('2d');
  var acoesChart = new Chart(ctxAcoes, {
      type: 'bar',
      data: {
          labels: ['Ações'],
          datasets: [{
              label: '% Ações Concluídas',
              data: [percentualAcoes],  // Use a variável percentualAcoes
              backgroundColor: '#ff6384'
          }]
      }
  });
</script>
</body>
</html>
