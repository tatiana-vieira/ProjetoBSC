<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <title>      
    {% block titulo %} 
    {% endblock %}
  </title>
  <style>
    .navbar-custom {
        background-color: darkblue; /* Define a cor de fundo da barra de navegação */
    }
    .card {
        background-color: #f8f9fa;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .card-title {
        font-size: 1.5rem;
        font-weight: bold;
    }
    .card-text {
        font-size: 1.25rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">  
  <div class="container-fluid">
    <a class="navbar-brand" href="#">PPGEXPLORER</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">            
        <!-- Seu código de navegação -->
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/logout">Sair</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Conteúdo principal -->
<br>
<div class="container">
    <img src="{{ url_for('static', filename='PPG.png') }}" alt="Imagem 1" class="mx-auto d-block"><br>
</div>

<!-- Dashboard Resumido -->
<div class="container mt-5">
  <div class="row text-center">
    <div class="col">
      <h2>Resumo do Planejamento Estratégico</h2>
    </div>
  </div>
  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Metas Atingidas</h5>
          <p class="card-text">
            <strong>{{ percentual_metas_atingidas }}%</strong> das metas foram atingidas no último ciclo.
          </p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Ações Concluídas</h5>
          <p class="card-text">
            <strong>{{ percentual_acoes_concluidas }}%</strong> das ações estão concluídas.
          </p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Status Geral</h5>
          <canvas id="statusChart"></canvas> <!-- Adiciona o canvas para o gráfico -->
        </div>
      </div>
    </div>
  </div>
</div>

{% block conteudo %}
{% endblock %}

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

<!-- Adiciona o gráfico de progresso -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  var ctx = document.getElementById('statusChart').getContext('2d');
  var myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
          labels: ['Ações Concluídas', 'Ações Em Andamento'],
          datasets: [{
            data: [{{ percentual_acoes_concluidas }}, {{ 100 - percentual_acoes_concluidas }}],
            backgroundColor: ['#36a2eb', '#ff6384'],
          }]
      },
  });
</script>

</body>
</html>
